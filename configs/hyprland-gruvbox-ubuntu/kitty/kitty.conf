# ==========================================
# KITTY CONFIGURATION
# ==========================================

# --- Fonts ---
# Using the default font for now, un-comment later if you install Nerd Fonts
#font_family      monospace
#bold_font        auto
#italic_font      auto
#bold_italic_font auto
#font_size        11.0

# --- Fonts ---
font_family      JetBrainsMono Nerd Font
bold_font        auto
italic_font      auto
bold_italic_font auto
font_size        11.0

# --- Window Layout & Performance ---
window_padding_width 8
remember_window_size  no
initial_width        960
initial_height       600
update_check_interval 0

# --- Performance Tuning ---
# Matches rendering loop efficiency to your 144Hz display capabilities
repaint_delay    6
input_delay      1
sync_to_monitor  yes

# --- Terminal Bell ---
enable_audio_bell no

# --- Theme / Colors (Gruvbox Dark) ---
background            #282828
foreground            #ebdbb2
selection_background  #504945
selection_foreground  #ebdbb2
url_color             #d65d0e

