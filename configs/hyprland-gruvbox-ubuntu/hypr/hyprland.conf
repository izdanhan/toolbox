# #######################################################################################
# AUTOGENERATED HYPRLAND CONFIG.
# TRANSLATED TO CLASSIC FORMAT FOR HYPRLAND v0.53.3 (BUG-FREE PARSING)
# #######################################################################################


# -----------------------------------------------------
# MONITORS
# -----------------------------------------------------

# Default configurations on startup
monitor = eDP-1, 1920x1200@60, auto, 1, vrr, 1
monitor = DP-6, disable
monitor = DP-8, disable
monitor = DP-9, disable
monitor = HDMI-A-1, disable


# -----------------------------------------------------
# MY PROGRAMS
# -----------------------------------------------------
$terminal    = alacritty
$browser     = firefox
$fileManager = nemo
$menu        = rofi -show drun


# -----------------------------------------------------
# AUTOSTART
# -----------------------------------------------------
exec-once = waybar
# exec-once = hyprpaper
exec-once = swaybg -i ~/Pictures/wallpaper.jpg
exec-once = swaync
exec-once = systemctl --user start hyprpolkitagent
exec-once = hypridle


# -----------------------------------------------------
# ENVIRONMENT VARIABLES
# -----------------------------------------------------
env = XCURSOR_SIZE,24
env = HYPRCURSOR_SIZE,24


# -----------------------------------------------------
# LOOK AND FEEL
# -----------------------------------------------------
general {
    gaps_in = 4
    gaps_out = 8
    border_size = 2

    col.active_border = rgba(8ec07cee) rgba(fabd2fee) 45deg
    col.inactive_border = rgba(504945aa)

    layout = dwindle
}

decoration {
    rounding = 10
    active_opacity = 1.0
    inactive_opacity = 1.0

    shadow {
        enabled = true
        range = 4
        render_power = 3
        color = rgba(1a1a1aee)
    }

    blur {
        enabled = true
        size = 3
        passes = 1
        vibrancy = 0.1696
    }
}

animations {
    enabled = true
}

# Bezier curves
bezier = easeOutQuint, 0.23, 1, 0.32, 1
bezier = easeInOutCubic, 0.65, 0.05, 0.36, 1
bezier = linear, 0, 0, 1, 1
bezier = almostLinear, 0.5, 0.5, 0.75, 1
bezier = quick, 0.15, 0, 0.1, 1
bezier = easy, 0.1, 0.71, 0.15, 1

animation = global, 1, 10, default
animation = border, 1, 5.39, easeOutQuint
animation = windows, 1, 4.79, easy
animation = windowsIn, 1, 4.1, easy, popin 87%
animation = windowsOut, 1, 1.49, linear, popin 87%
animation = fadeIn, 1, 1.73, almostLinear
animation = fadeOut, 1, 1.46, almostLinear
animation = fade, 1, 3.03, quick
animation = layers, 1, 3.81, easeOutQuint
animation = layersIn, 1, 4, easeOutQuint, fade
animation = layersOut, 1, 1.5, linear, fade
animation = fadeLayersIn, 1, 1.79, almostLinear
animation = fadeLayersOut, 1, 1.39, almostLinear
animation = workspaces, 1, 1.94, almostLinear, fade
animation = workspacesIn, 1, 1.21, almostLinear, fade
animation = workspacesOut, 1, 1.94, almostLinear, fade
animation = zoomFactor, 1, 7, quick


# -----------------------------------------------------
# LAYOUTS
# -----------------------------------------------------
dwindle {
    preserve_split = true
}

master {
    new_status = master
}


# -----------------------------------------------------
# MISC
# -----------------------------------------------------
misc {
    vrr = 1
    force_default_wallpaper = 0
    disable_hyprland_logo = true
}


# -----------------------------------------------------
# INPUT
# -----------------------------------------------------
input {
    kb_layout = fi
    kb_variant = 
    kb_model = 
    kb_options = 
    kb_rules = 

    follow_mouse = 1
    sensitivity = 0

    touchpad {
        natural_scroll = false
        gesture = 3, horizontal, workspace
    }
}

device {
    name = epic-mouse-v1
    sensitivity = -0.5
}


# -----------------------------------------------------
# KEYBINDINGS
# -----------------------------------------------------
$mainMod = SUPER

# Core Application Binds
bind = $mainMod, Return, exec, $terminal
bind = $mainMod, E, exec, $fileManager
bind = $mainMod, B, exec, $browser

# Custom Menus & Scripts
bind = $mainMod, T, exec, ~/.config/hypr/scripts/tui-menu.sh # TUI menu for Bluetooth and etc
bind = $mainMod, ESCAPE, exec, ~/.config/hypr/scripts/powermenu.sh # TUI menu for logout
bind = $mainMod, P, exec, ~/.config/hypr/scripts/power-profile.sh # TUI menu for power profiles

# Displays
# bind = $mainMod CTRL, D, exec, ~/.config/hypr/scripts/display-profile.sh # TUI menu for display profiles
# bind = $mainMod CTRL, F1, exec, ~/.config/hypr/scripts/display-profile.sh laptop
# bind = $mainMod CTRL, F2, exec, ~/.config/hypr/scripts/display-profile.sh desktop
# bind = $mainModR CTRL, F3, exec, ~/.config/hypr/scripts/display-profile.sh tv

# Apps
bind = $mainMod, C, exec, code
bind = $mainMod, R, exec, $terminal -e mc
bind = $mainMod, I, exec, $terminal -e btop

# Print -> Capture a selected area and open in Swappy editor
bind = , Print, exec, grim -g "$(slurp)" - | swappy -f -

# Shift + Print -> Capture full screen directly to clipboard
bind = SHIFT, Print, exec, grim - | wl-copy

# Lock
# bind = $mainMod CTRL, L, exec, hyprlock

# Window Management
bind = $mainMod, Q, killactive,
bind = $mainMod SHIFT, Q, exec, hyprctl kill
bind = $mainMod, F, fullscreen, 1
bind = $mainMod SHIFT, F, fullscreen, 0
bind = $mainMod, SPACE, exec, $menu
bind = $mainMod, V, togglefloating,
bind = $mainMod SHIFT, ESCAPE, exit,

# Focus Movements (Vim + Arrows)
bind = $mainMod, H, movefocus, l
bind = $mainMod, L, movefocus, r
bind = $mainMod, K, movefocus, u
bind = $mainMod, J, movefocus, d
bind = $mainMod, left, movefocus, l
bind = $mainMod, right, movefocus, r
bind = $mainMod, up, movefocus, u
bind = $mainMod, down, movefocus, d

# Move Active Window (Vim + Arrows)
bind = $mainMod SHIFT, H, movewindow, l
bind = $mainMod SHIFT, L, movewindow, r
bind = $mainMod SHIFT, K, movewindow, u
bind = $mainMod SHIFT, J, movewindow, d
bind = $mainMod SHIFT, left, movewindow, l
bind = $mainMod SHIFT, right, movewindow, r
bind = $mainMod SHIFT, up, movewindow, u
bind = $mainMod SHIFT, down, movewindow, d

# Window Resizing (Vim + Arrows)
binde = $mainMod ALT, H, resizeactive, -40 0
binde = $mainMod ALT, L, resizeactive, 40 0
binde = $mainMod ALT, K, resizeactive, 0 -40
binde = $mainMod ALT, J, resizeactive, 0 40
binde = $mainMod ALT, left, resizeactive, -40 0
binde = $mainMod ALT, right, resizeactive, 40 0
binde = $mainMod ALT, up, resizeactive, 0 -40
binde = $mainMod ALT, down, resizeactive, 0 40

# Workspace Quick Cycle
bind = $mainMod, X, workspace, e+1
bind = $mainMod CTRL, L, workspace, e+1
bind = $mainMod, Z, workspace, e-1
bind = $mainMod CTRL, H, workspace, e-1

# Numeric Workspace Swapping
bind = $mainMod, 1, workspace, 1
bind = $mainMod, 2, workspace, 2
bind = $mainMod, 3, workspace, 3
bind = $mainMod, 4, workspace, 4
bind = $mainMod, 5, workspace, 5
bind = $mainMod, 6, workspace, 6
bind = $mainMod, 7, workspace, 7
bind = $mainMod, 8, workspace, 8
bind = $mainMod, 9, workspace, 9
bind = $mainMod, 0, workspace, 10

bind = $mainMod SHIFT, 1, movetoworkspace, 1
bind = $mainMod SHIFT, 2, movetoworkspace, 2
bind = $mainMod SHIFT, 3, movetoworkspace, 3
bind = $mainMod SHIFT, 4, movetoworkspace, 4
bind = $mainMod SHIFT, 5, movetoworkspace, 5
bind = $mainMod SHIFT, 6, movetoworkspace, 6
bind = $mainMod SHIFT, 7, movetoworkspace, 7
bind = $mainMod SHIFT, 8, movetoworkspace, 8
bind = $mainMod SHIFT, 9, movetoworkspace, 9
bind = $mainMod SHIFT, 0, movetoworkspace, 10

# Special Workspaces
bind = $mainMod, S, togglespecialworkspace, magic
bind = $mainMod SHIFT, S, movetoworkspace, special:magic

# Scroll Focus
bind = $mainMod, mouse_down, workspace, e+1
bind = $mainMod, mouse_up, workspace, e-1

# Mouse Drags
bindm = $mainMod, mouse:272, movewindow
bindm = $mainMod, mouse:273, resizewindow

# Multimedia Binds (Volume + Brightness)
bindel = , XF86AudioRaiseVolume, exec, wpctl set-volume -l 1 @DEFAULT_AUDIO_SINK@ 5%+
bindel = , XF86AudioLowerVolume, exec, wpctl set-volume @DEFAULT_AUDIO_SINK@ 5%-
bindel = , XF86AudioMute, exec, wpctl set-mute @DEFAULT_AUDIO_SINK@ toggle
bindel = , XF86AudioMicMute, exec, wpctl set-mute @DEFAULT_AUDIO_SOURCE@ toggle
#bindel = , XF86MonBrightnessUp, exec, brightnessctl -e4 -n2 set 5%+
#bindel = , XF86MonBrightnessDown, exec, brightnessctl -e4 -n2 set 5%-

# Screen brightness keys
binde = , XF86MonBrightnessUp, exec, brightnessctl set 5%+
binde = , XF86MonBrightnessDown, exec, brightnessctl set 5%-

# Player Controls (Media keys)
bindl = , XF86AudioNext, exec, playerctl next
bindl = , XF86AudioPause, exec, playerctl play-pause
bindl = , XF86AudioPlay, exec, playerctl play-pause
bindl = , XF86AudioPrev, exec, playerctl previous


# -----------------------------------------------------
# WINDOW RULES (Hyprland 0.53 Strict Block Syntax)
# -----------------------------------------------------

# Fixes windowrulev2 deprecated syntax completely.
# Boolean values now require explicit values (e.g. `on`, `1`, `true`).

windowrule {
    name = ignore-maximize-events
    match:class = .*
    suppress_event = maximize
}

windowrule {
    name = fix-xwayland-drags
    match:class = ^$
    match:title = ^$
    match:xwayland = true
    match:float = true
    match:fullscreen = false
    match:pin = false
    no_focus = true
}

windowrule {
    name = move-hyprland-run
    match:class = hyprland-run
    float = true
    move = 20 monitor_h-120
}

windowrule {
    name = float-tui-utilities
    match:class = floating_tui
    float = true
    size = 900 600
    center = true
}

windowrule {
    name = float-imv
    match:class = imv
    float = true
    center = true
}

windowrule {
    name = float-kitty-image
    match:class = kitty-image
    float = true
    center = true
}
