# ------------------------------------------------------------------------------
# Optimized /etc/tlp.conf for ThinkPad T14s Gen 4 (AMD Ryzen 7840U)
# ------------------------------------------------------------------------------

# General Enable
TLP_ENABLE=1

# --- CPU and Performance ---

# Use the modern AMD P-State Active driver for Zen 4
CPU_DRIVER_OPMODE_ON_AC=active
CPU_DRIVER_OPMODE_ON_BAT=active

# Set Energy Performance Preference (EPP)
# 'balance_performance' on AC; 'balance_power' on BAT for efficiency without lag
CPU_ENERGY_PERF_POLICY_ON_AC=performance
CPU_ENERGY_PERF_POLICY_ON_BAT=balance_power

# CPU Scaling Governor
# 'powersave' is the standard for the amd-pstate-epp driver
CPU_SCALING_GOVERNOR_ON_AC=performance
CPU_SCALING_GOVERNOR_ON_BAT=powersave

# Boost settings
CPU_BOOST_ON_AC=1
CPU_BOOST_ON_BAT=0

# --- Platform Profile ---

# Adjusts fan curves and thermal limits
PLATFORM_PROFILE_ON_AC=performance
PLATFORM_PROFILE_ON_BAT=low-power

# --- Battery Care (ThinkPad Specific) ---

# Your requested 75/80% thresholds to preserve battery health
START_CHARGE_THRESH_BAT0=75
STOP_CHARGE_THRESH_BAT0=80

# --- Disk and Graphics ---

# NVMe/SATA Power Management
AHCI_RUNTIME_PM_ON_AC=on
AHCI_RUNTIME_PM_ON_BAT=auto

# AMD GPU Integrated Graphics DPM
RADEON_DPM_PERF_LEVEL_ON_AC=auto
RADEON_DPM_PERF_LEVEL_ON_BAT=auto

# --- Connectivity and Audio ---

# Enable WiFi Power Saving on battery
WIFI_PWR_ON_AC=off
WIFI_PWR_ON_BAT=on

# Audio Power Saving
SOUND_POWER_SAVE_ON_AC=1
SOUND_POWER_SAVE_ON_BAT=1
SOUND_POWER_SAVE_CONTROLLER=Y

# --- Bus Management ---

# PCIe Active State Power Management
PCIE_ASPM_ON_AC=default
PCIE_ASPM_ON_BAT=powersave

# USB Autosuspend
USB_AUTOSUSPEND=1
